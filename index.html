<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Art Studio</title>
  <link rel="stylesheet" href="style.css" />
  <!-- TensorFlow.js + COCO-SSD for real object detection -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
</head>
<body>
  <div class="studio">

    <!-- LEFT: Canvas Area -->
    <div class="canvas-area" id="canvas-area">
      <canvas id="art"></canvas>
      <div class="checkerboard" id="checkerboard"></div>

      <!-- Loading indicator — removed by app.js once initialised -->
      <div id="loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#555;font-family:monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;pointer-events:none;z-index:10;">Loading...</div>

      <!-- HUD top-left -->
      <div class="canvas-hud" id="canvas-hud">
        <div class="hud-line" id="hud-algo"></div>
        <div class="hud-line" id="hud-equation"></div>
        <div class="hud-line bright" id="hud-mode"></div>
      </div>

      <!-- HUD bottom-left: zoom info -->
      <div class="zoom-hud" id="zoom-hud">
        <div class="hud-line" id="hud-zoom"></div>
      </div>

      <!-- HUD bottom-right: help -->
      <div class="help-hud" id="help-hud">
        <div class="hud-line" id="hud-help"></div>
      </div>
    </div>

    <!-- RIGHT: Control Panel -->
    <div class="panel" id="panel">

      <!-- Header -->
      <div class="panel-header">
        <h1>Code Art Studio</h1>
        <span class="status-paused" id="play-status">PAUSED</span>
      </div>

      <!-- Source (image / video / camera) -->
      <div class="panel-section" id="section-image-processor">
        <h2>Source</h2>
        <div class="controls">

          <div class="btn-grid">
            <button class="btn" id="btn-ip-upload">Upload</button>
            <button class="btn" id="btn-ip-camera">Camera</button>
          </div>
          <input type="file" id="ip-file-input" accept="image/*,video/*" style="display:none;" />

          <div id="ip-controls" style="display:none;">
            <div class="slider-row" style="margin-top:4px;">
              <div class="slider-label"><span>Scale</span><span class="val" id="val-ip-scale">1.00</span></div>
              <input type="range" id="sl-ip-scale" min="0.1" max="5" step="0.05" value="1" />
            </div>
            <div class="slider-row">
              <div class="slider-label"><span>X Offset</span><span class="val" id="val-ip-x">0</span></div>
              <input type="range" id="sl-ip-x" min="-500" max="500" step="5" value="0" />
            </div>
            <div class="slider-row">
              <div class="slider-label"><span>Y Offset</span><span class="val" id="val-ip-y">0</span></div>
              <input type="range" id="sl-ip-y" min="-500" max="500" step="5" value="0" />
            </div>

            <div class="toggle-row" style="margin-top:6px;">
              <label for="ip-enabled-toggle">Enable Distortion</label>
              <div class="toggle" id="ip-enabled-toggle"></div>
            </div>

            <div class="slider-label" style="margin-top:6px; margin-bottom:4px;"><span>Distortion Effect</span></div>
            <div class="distortion-grid" id="ip-effect-grid">
              <!-- Populated by JS -->
            </div>

            <div id="ip-param-controls" style="margin-top:6px;">
              <!-- Dynamic params per distortion -->
            </div>

            <div class="toggle-row" style="margin-top:6px;">
              <label for="ip-mix-toggle">Mix with Algorithm</label>
              <div class="toggle" id="ip-mix-toggle"></div>
            </div>

            <button class="btn full" id="btn-ip-remove" style="margin-top:6px; color:#a77; border-color:#533;">Remove Source</button>
          </div>

        </div>
      </div>

      <!-- Algorithm Grid -->
      <div class="panel-section" id="section-algo">
        <h2>Algorithm</h2>
        <div class="algo-grid" id="algo-grid">
          <!-- Populated dynamically by algo-grid.js from registry -->
        </div>
      </div>

      <!-- Parameters -->
      <div class="panel-section" id="section-params">
        <h2>Parameters</h2>
        <div class="controls" id="param-controls">
          <!-- Populated by JS per algorithm -->
        </div>
      </div>

      <!-- Layers (collapsed by default — advanced) -->
      <div class="panel-section collapsed" id="section-layers">
        <h2>Layers</h2>
        <div class="controls">
          <div id="layer-list">
            <!-- Populated by JS -->
          </div>
          <div class="btn-grid" style="margin-top:4px;">
            <button class="btn full" id="btn-add-layer">Add Layer</button>
          </div>
        </div>
      </div>

      <!-- Symmetry (collapsed by default — advanced) -->
      <div class="panel-section collapsed" id="section-symmetry">
        <h2>Symmetry</h2>
        <div class="controls">
          <div class="toggle-row">
            <label for="sym-toggle">Mirror / Fold</label>
            <div class="toggle" id="sym-toggle" data-state-key="sym"></div>
          </div>
          <div class="slider-row">
            <div class="slider-label">
              <span>Folds</span>
              <span class="val" id="val-folds">8</span>
            </div>
            <input type="range" id="sl-folds" min="2" max="16" step="1" value="8" data-state-key="folds" />
          </div>
        </div>
      </div>

      <!-- Style -->
      <div class="panel-section" id="section-style">
        <h2>Style</h2>
        <div class="controls">

          <!-- Background Color -->
          <div class="slider-label"><span>Background</span></div>
          <div class="color-row">
            <input type="color" id="bg-color-picker" value="#000000" />
            <div class="swatches" id="bg-presets">
              <div class="swatch active" data-bg="#000000" style="background:#000;border:1px solid #333;" title="Black"></div>
              <div class="swatch" data-bg="#f0efe8" style="background:#f0efe8;" title="Cream"></div>
              <div class="swatch" data-bg="#0a0a0a" style="background:#0a0a0a;border:1px solid #222;" title="Near Black"></div>
              <div class="swatch" data-bg="#1a1a2e" style="background:#1a1a2e;" title="Dark Blue"></div>
              <div class="swatch" data-bg="#0d1b2a" style="background:#0d1b2a;" title="Navy"></div>
            </div>
          </div>

          <!-- Shape Color -->
          <div class="slider-label" style="margin-top:6px;"><span>Shape</span></div>
          <div class="color-row">
            <input type="color" id="fg-color-picker" value="#ffffff" />
            <div class="swatches" id="fg-presets">
              <div class="swatch active" data-fg="#ffffff" style="background:#fff;" title="White"></div>
              <div class="swatch" data-fg="#000000" style="background:#000;border:1px solid #333;" title="Black"></div>
              <div class="swatch" data-fg="#bbbbbb" style="background:#bbb;" title="Silver"></div>
              <div class="swatch" data-fg="#00aaff" style="background:#00aaff;" title="Cyan"></div>
              <div class="swatch" data-fg="#cc00aa" style="background:#cc00aa;" title="Magenta"></div>
              <div class="swatch" data-fg="#ffaa00" style="background:#ffaa00;" title="Amber"></div>
              <div class="swatch" data-fg="#44ff44" style="background:#44ff44;" title="Green"></div>
              <div class="swatch" data-fg="#ff4444" style="background:#ff4444;" title="Red"></div>
            </div>
          </div>

          <!-- Glow Tint (optional, on top) -->
          <div class="slider-label" style="margin-top:6px;"><span>Glow Color</span></div>
          <div class="color-row">
            <input type="color" id="glow-color-picker" value="#00aaff" />
            <div class="swatches" id="glow-presets">
              <div class="swatch active" data-glow="same" style="background:linear-gradient(135deg,#888,#fff);" title="Same as shape"></div>
              <div class="swatch" data-glow="#00aaff" style="background:#00aaff;" title="Cyan"></div>
              <div class="swatch" data-glow="#4444ff" style="background:#4444ff;" title="Blue"></div>
              <div class="swatch" data-glow="#cc00aa" style="background:#cc00aa;" title="Magenta"></div>
              <div class="swatch" data-glow="#ff4444" style="background:#ff4444;" title="Red"></div>
              <div class="swatch" data-glow="#ffaa00" style="background:#ffaa00;" title="Amber"></div>
            </div>
          </div>

          <!-- Glow -->
          <div class="slider-row">
            <div class="slider-label">
              <span>Glow</span>
              <span class="val" id="val-glow">0</span>
            </div>
            <input type="range" id="sl-glow" min="0" max="30" step="0.5" value="0" data-state-key="glow" />
          </div>

          <!-- Blur -->
          <div class="slider-row">
            <div class="slider-label">
              <span>Blur</span>
              <span class="val" id="val-blur">0</span>
            </div>
            <input type="range" id="sl-blur" min="0" max="20" step="0.5" value="0" data-state-key="blur" />
          </div>

          <!-- Grain -->
          <div class="slider-row">
            <div class="slider-label">
              <span>Grain</span>
              <span class="val" id="val-grain">0.00</span>
            </div>
            <input type="range" id="sl-grain" min="0" max="1" step="0.01" value="0" data-state-key="grain" />
          </div>

          <!-- Line Weight -->
          <div class="slider-row">
            <div class="slider-label">
              <span>Line Weight</span>
              <span class="val" id="val-lineWeight">1.0</span>
            </div>
            <input type="range" id="sl-lineWeight" min="0.2" max="5" step="0.1" value="1" data-state-key="lineWeight" />
          </div>

          <!-- Transparent -->
          <div class="toggle-row">
            <label for="transparent-toggle">Transparent BG</label>
            <div class="toggle" id="transparent-toggle" data-state-key="transparent"></div>
          </div>

        </div>
      </div>

      <!-- (Legacy "Image Layer" section removed — Source section above
           handles all image/video/camera input. Removing the duplicate
           cleans up the panel for the Kiln-facing build.) -->

      <!-- Actions -->
      <div class="panel-section" id="section-actions">
        <h2>Actions</h2>
        <div class="controls">

          <div class="slider-label"><span>Scroll Mode</span></div>
          <div class="btn-grid">
            <button class="btn active" id="btn-scroll-detail" data-scroll="detail">Detail</button>
            <button class="btn" id="btn-scroll-zoom" data-scroll="zoom">Zoom</button>
          </div>

          <div class="toggle-row" style="margin-top:6px;">
            <label for="cursor-toggle">Cursor Animation</label>
            <div class="toggle" id="cursor-toggle" data-state-key="cursorMode"></div>
          </div>

          <div class="btn-grid" style="margin-top:6px;">
            <button class="btn accent full" id="btn-play-pause">Play</button>
          </div>

          <div class="btn-grid" style="margin-top:4px;">
            <button class="btn" id="btn-randomize">Randomize</button>
            <button class="btn" id="btn-reset-view">Reset View</button>
          </div>

          <div class="btn-grid" style="margin-top:4px;">
            <button class="btn" id="btn-export-png">Export JPG</button>
            <button class="btn" id="btn-export-svg">Export PNG</button>
          </div>

          <div class="btn-grid" style="margin-top:4px;">
            <button class="btn record full" id="btn-record">Record Video</button>
          </div>

          <div class="slider-row" style="margin-top:6px;" id="record-duration-row">
            <div class="slider-label">
              <span>Duration</span>
              <span class="val" id="val-rec-duration">10s</span>
            </div>
            <input type="range" id="sl-rec-duration" min="3" max="60" step="1" value="10" data-state-key="rec_duration" />
          </div>

        </div>
      </div>

    </div><!-- end .panel -->
  </div><!-- end .studio -->

  <script type="module" src="js/app.js"></script>
</body>
</html>
